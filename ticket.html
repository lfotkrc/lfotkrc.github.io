<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Support – Dev Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050712;
            --bg-alt: #0d101c;
            --card: #141827;
            --border: #22283a;
            --accent: #4ade80;
            --primary: #6366f1;
            --text-main: #ffffff;
            --text-muted: #b5b5c5;
        }

        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background: radial-gradient(circle at top, #1a1f35 0, #050712 55%);
            color: var(--text-main);
        }

        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
            background: rgba(5, 7, 18, 0.85);
            border-bottom: 1px solid rgba(34, 40, 58, 0.7);
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 700;
            letter-spacing: 0.08em;
            font-size: 1rem;
            text-transform: uppercase;
            color: var(--accent);
        }

        .nav-links a {
            margin-left: 1.2rem;
            font-size: 0.95rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* HERO */
        .hero {
            max-width: 900px;
            margin: 0 auto;
            padding: 3.5rem 1.2rem 2rem;
        }

        .hero h1 {
            font-size: 2.2rem;
            margin-bottom: 0.4rem;
        }

        .hero p {
            color: var(--text-muted);
            margin: 0;
        }

        /* CONTAINER */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.2rem 2.5rem;
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 1.4rem;
            margin-bottom: 1.2rem;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 0.8rem;
            font-size: 1.2rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.5rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #101320;
            color: #fff;
            font-size: 0.95rem;
        }

        button {
            margin-top: 1rem;
            padding: 0.8rem 1.2rem;
            background: var(--accent);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1rem;
            color: #000;
            transition: 0.2s;
        }

        button:hover {
            background: #7affb0;
        }

        #status {
            margin-top: 1rem;
            color: var(--accent);
            font-size: 0.9rem;
        }

        footer {
            margin-top: 3rem;
            padding: 2rem 1.2rem;
            background: #050712;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="nav-inner">
            <div class="logo">DEV STORE</div>
            <div class="nav-links">
                <a href="index.html#home">Accueil</a>
                <a href="index.html#scripts">Scripts</a>
                <a href="index.html#premium">Premium</a>
                <a href="contact.html">Contact</a>
                <a href="ticket.html">Support</a>
                <a href="index.html#crypto">Crypto</a>
            </div>
        </div>
    </div>

    <!-- HERO -->
    <section class="hero">
        <h1>Support</h1>
        <p>Ouvre un ticket si tu as un problème ou une question.</p>
    </section>

    <!-- FORMULAIRE -->
    <div class="container">

        <div class="card">
            <h2>🎫 Ouvrir un ticket</h2>

            <form id="ticketForm">
                <label>Pseudo Discord</label>
                <input type="text" id="pseudo" required>

                <label>Produit concerné</label>
                <input type="text" id="produit" required>

                <label>Description du problème</label>
                <textarea id="message" rows="5" required></textarea>

                <button type="submit">Envoyer le ticket</button>
            </form>

            <p id="status"></p>
        </div>

    </div>

    <footer>
        Dev Store – Scripts PC & OSINT
    </footer>

    <script>
        document.getElementById("ticketForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const pseudo = document.getElementById("pseudo").value;
            const produit = document.getElementById("produit").value;
            const message = document.getElementById("message").value;

            const discordURL =
                "https://discord.com/users/1048922559841837136/message?text=" +
                encodeURIComponent(
                    "🎫 **Nouveau ticket support**\n" +
                    "👤 Pseudo : " + pseudo + "\n" +
                    "📦 Produit : " + produit + "\n" +
                    "📝 Message : " + message
                );

            window.location.href = discordURL;

            document.getElementById("status").innerText =
                "Ticket prêt à être envoyé dans Discord.";
        });
    </script>

</body>
</html>
